name: Build APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 定位项目目录
        run: |
          if [ -f "settings.gradle" ]; then
            PROJECT_DIR="."
          elif [ -f "MemoApp/settings.gradle" ]; then
            PROJECT_DIR="MemoApp"
          else
            echo "::error::找不到 settings.gradle"
            find . -name "settings.gradle" || true
            exit 1
          fi
          echo "PROJECT_DIR=${PROJECT_DIR}" >> $GITHUB_ENV
          echo "项目目录: ${PROJECT_DIR}"

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 安装 Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          echo "$PWD/gradle-8.2/bin" >> $GITHUB_PATH

      - name: 设置 Android SDK
        run: |
          ANDROID_SDK_ROOT=$HOME/android-sdk
          mkdir -p ${ANDROID_SDK_ROOT}/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools ${ANDROID_SDK_ROOT}/cmdline-tools/latest
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}" >> $GITHUB_ENV
          echo "ANDROID_HOME=${ANDROID_SDK_ROOT}" >> $GITHUB_ENV
          echo "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: 安装 Android SDK 组件
        run: |
          yes | sdkmanager --sdk_root=${ANDROID_SDK_ROOT} --licenses
          sdkmanager --sdk_root=${ANDROID_SDK_ROOT} "platforms;android-34" "build-tools;34.0.0"

      - name: 生成 local.properties
        run: |
          echo "sdk.dir=${ANDROID_HOME}" > ${PROJECT_DIR}/local.properties

      - name: 生成 Gradle Wrapper
        run: |
          cd ${PROJECT_DIR}
          gradle wrapper --gradle-version 8.2

      - name: 编译 Debug APK
        run: |
          cd ${PROJECT_DIR}
          ./gradlew assembleDebug

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: MemoApp-debug
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/app-debug.apk
