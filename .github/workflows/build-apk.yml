name: Build APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:  # 允许在 GitHub 网页上手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 安装 Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          echo "GRADLE_HOME=$PWD/gradle-8.2" >> $GITHUB_ENV
          echo "$PWD/gradle-8.2/bin" >> $GITHUB_PATH

      - name: 设置 Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: 安装 Android SDK 组件
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: 生成 Gradle Wrapper
        run: gradle wrapper --gradle-version 8.2

      - name: 编译 Debug APK
        run: ./gradlew assembleDebug

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: MemoApp-debug
          path: app/build/outputs/apk/debug/app-debug.apk
